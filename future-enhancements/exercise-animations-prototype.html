<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exercise Animations Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f13;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding: 40px 20px 60px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }
  h1 span { color: #ff6b35; }
  .sub {
    text-align: center;
    font-size: 13px;
    color: #6b6b74;
    margin-bottom: 36px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 18px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #16161b;
    border: 1px solid #26262c;
    border-radius: 16px;
    padding: 14px 10px 16px;
    text-align: center;
  }
  .anim {
    width: 120px;
    height: 120px;
    margin: 0 auto 6px;
    position: relative;
  }
  .anim svg { width: 100%; height: 100%; display: block; }
  .anim svg g { position: absolute; }
  .name {
    font-size: 13px;
    font-weight: 600;
    color: #f2f2f2;
  }

  /* Approved crossfade technique — 1.4s cycle, ease-in-out, ~10% holds each extreme */
  .pose-a, .pose-b { animation-duration: 1.4s; animation-iteration-count: infinite; }
  .pose-a { animation-name: showA; }
  .pose-b { animation-name: showB; }
  @keyframes showA {
    0%   { opacity: 1; animation-timing-function: ease-in-out; }
    10%  { opacity: 1; animation-timing-function: ease-in-out; }
    45%  { opacity: 0; }
    60%  { opacity: 0; animation-timing-function: ease-in-out; }
    95%  { opacity: 1; }
    100% { opacity: 1; }
  }
  @keyframes showB {
    0%   { opacity: 0; animation-timing-function: ease-in-out; }
    10%  { opacity: 0; animation-timing-function: ease-in-out; }
    45%  { opacity: 1; }
    60%  { opacity: 1; animation-timing-function: ease-in-out; }
    95%  { opacity: 0; }
    100% { opacity: 0; }
  }
  /* slight stagger so the grid feels alive, not metronomic */
  .card:nth-child(3n) .pose-a, .card:nth-child(3n) .pose-b { animation-delay: -.45s; }
  .card:nth-child(3n+1) .pose-a, .card:nth-child(3n+1) .pose-b { animation-delay: -.9s; }

  /* Lunge: 3-pose ping-pong (stand -> mid -> lunge -> mid -> stand) so the step-down reads smoothly */
  .lunge-a, .lunge-mid, .lunge-b { animation-duration: 2.4s; animation-iteration-count: infinite; }
  .lunge-a { animation-name: lungeA; }
  .lunge-mid { animation-name: lungeMid; }
  .lunge-b { animation-name: lungeB; }
  @keyframes lungeA {
    0%   { opacity: 1; animation-timing-function: ease-in-out; }
    10%  { opacity: 1; animation-timing-function: ease-in-out; }
    20%  { opacity: 0; }
    85%  { opacity: 0; animation-timing-function: ease-in-out; }
    95%  { opacity: 1; }
    100% { opacity: 1; }
  }
  @keyframes lungeMid {
    0%   { opacity: 0; }
    10%  { opacity: 0; animation-timing-function: ease-in-out; }
    20%  { opacity: 1; animation-timing-function: ease-in-out; }
    35%  { opacity: 1; animation-timing-function: ease-in-out; }
    45%  { opacity: 0; }
    55%  { opacity: 0; animation-timing-function: ease-in-out; }
    65%  { opacity: 1; animation-timing-function: ease-in-out; }
    85%  { opacity: 1; animation-timing-function: ease-in-out; }
    95%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes lungeB {
    0%   { opacity: 0; }
    35%  { opacity: 0; animation-timing-function: ease-in-out; }
    45%  { opacity: 1; }
    55%  { opacity: 1; animation-timing-function: ease-in-out; }
    65%  { opacity: 0; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

    <!-- LUNGE: 3-pose SIDE profile — upright stand -> partial step-down -> deep lunge (front knee ~90, back knee dropped) -->
    <div class="card">
